<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, Tita 💖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  background: #000;
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.portrait-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
}
.back-btn {
  font-family: Georgia, serif;
  font-style: italic;
  color: rgba(232,164,184,0.8);
  font-size: 0.82rem;
  letter-spacing: 2px;
  cursor: pointer;
  border: 1px solid rgba(232,164,184,0.3);
  padding: 7px 16px;
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  transition: all 0.3s;
  text-decoration: none;
}
.back-btn:hover { background: rgba(232,164,184,0.15); color: #e8a4b8; }
.portrait-title {
  font-family: Georgia, serif;
  font-style: italic;
  color: rgba(232,164,184,0.65);
  font-size: clamp(0.75rem, 2.2vw, 0.95rem);
  letter-spacing: 3px;
  text-align: center;
  flex: 1;
  margin: 0 10px;
}

/* The portrait canvas wrapper */
#portraitWrap {
  width: 100vw;
  position: relative;
  padding-top: 56px; /* header space */
}

/* The actual text portrait - rendered via JS onto this element */
#portraitCanvas {
  display: block;
  width: 100%;
}

/* CSS text portrait fallback - exact replica of original technique */
#cssPortrait {
  display: none; /* shown after canvas fails */
  width: 100%;
  padding: 56px 0 100px 0;
}
#cssPortrait p {
  font-size: 10px;
  line-height: 7.5px;
  text-align: justify;
  background-size: 100% auto;
  background-repeat: no-repeat;
  background-position: center top;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: rgba(0,0,0,0);
  color: transparent;
  word-break: break-all;
  letter-spacing: 0.8px;
  padding: 0 2px;
  margin: 0;
  width: 100%;
}

/* Footer message */
.portrait-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 16px 20px 18px;
  background: linear-gradient(0deg, rgba(0,0,0,0.92) 0%, transparent 100%);
  text-align: center;
}
.footer-msg {
  font-family: Georgia, serif;
  font-style: italic;
  color: rgba(232,164,184,0.75);
  font-size: clamp(0.72rem, 2.2vw, 0.92rem);
  line-height: 1.55;
  max-width: 600px;
  margin: 0 auto;
}
.footer-sig {
  font-family: Georgia, serif;
  font-style: italic;
  color: rgba(232,164,184,0.45);
  font-size: clamp(0.65rem, 1.8vw, 0.8rem);
  margin-top: 5px;
  letter-spacing: 2px;
}

/* Fireworks */
#fwCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 20;
}
</style>
</head>
<body>

<canvas id="fwCanvas"></canvas>

<div class="portrait-header">
  <a class="back-btn" href="birthdayta.html">← Back</a>
  <div class="portrait-title">A Portrait Made With Love ✦</div>
  <div style="min-width:80px"></div>
</div>

<div id="portraitWrap">
  <!-- Canvas approach: draws text chars pixel by pixel sampling the image -->
  <canvas id="portraitCanvas"></canvas>
  
  <!-- CSS fallback (exact original technique, works on desktop) -->
  <div id="cssPortrait">
    <p id="cssP"></p>
  </div>
</div>

<div class="portrait-footer">
  <div class="footer-msg">Tita, this portrait was made just for you — every character, every dot, painted with love. Happy Birthday! 🌸</div>
  <div class="footer-sig">With all my heart 💕</div>
</div>

  const vw = window.innerWidth;
  // Maintain image aspect ratio
  const imgAspect = img.naturalHeight / img.naturalWidth;
  const canvasW = vw;
  const canvasH = Math.round(vw * imgAspect);

  portraitCanvas.width = canvasW;
  portraitCanvas.height = canvasH;
  portraitCanvas.style.width = '100%';
  portraitCanvas.style.height = 'auto';

  // Draw image to an offscreen canvas to sample pixels
  const offscreen = document.createElement('canvas');
  const cols = Math.floor(canvasW / (FONT_SIZE * LETTER_SP));
  const rows = Math.floor(canvasH / LINE_H);
  offscreen.width = cols;
  offscreen.height = rows;
  const octx = offscreen.getContext('2d');
  octx.drawImage(img, 0, 0, cols, rows);
  const pixels = octx.getImageData(0, 0, cols, rows).data;

  // Draw black background
  pctx.fillStyle = '#000';
  pctx.fillRect(0, 0, canvasW, canvasH);

  // Draw each character colored by the sampled pixel
  pctx.font = `${FONT_SIZE}px monospace`;
  pctx.textBaseline = 'top';

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const idx = (row * cols + col) * 4;
      const r = pixels[idx];
      const g = pixels[idx + 1];
      const b = pixels[idx + 2];
      // brightness-based visibility (skip very dark background areas)
      const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
      if (brightness < 8) continue;
      pctx.fillStyle = `rgb(${r},${g},${b})`;
      const x = col * (FONT_SIZE * LETTER_SP);
      const y = row * LINE_H;
      pctx.fillText(CHAR, x, y);
    }
  }
};
img.src = IMAGE_SRC;

// ── FIREWORKS ──────────────────────────────────────────────────────────────────
const fwCanvas = document.getElementById('fwCanvas');
const ctx = fwCanvas.getContext('2d');
fwCanvas.width = window.innerWidth;
fwCanvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
});

let particles = [];
class P {
  constructor(x, y) {
    this.x = x; this.y = y;
    const a = Math.random() * Math.PI * 2, s = Math.random() * 5 + 1.5;
    this.vx = Math.cos(a)*s; this.vy = Math.sin(a)*s;
    this.alpha = 1; this.r = Math.random()*2.5+0.5;
    this.c = ['#e8a4b8','#f5d5e5','#d4a843','#fff','#c4637a','#ffb6c1'][~~(Math.random()*6)];
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.07; this.alpha-=0.013; }
  draw(){ ctx.save(); ctx.globalAlpha=Math.max(0,this.alpha); ctx.fillStyle=this.c; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore(); }
}
function launch(){
  for(let i=0;i<4;i++){
    const x=Math.random()*fwCanvas.width, y=Math.random()*fwCanvas.height*0.5;
    for(let j=0;j<65;j++) particles.push(new P(x,y));
  }
}
let fc=0;
function anim(){
  ctx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  particles=particles.filter(p=>p.alpha>0);
  particles.forEach(p=>{p.update();p.draw();});
  fc++;
  if(fc<320) requestAnimationFrame(anim);
  else fwCanvas.style.display='none';
}
setTimeout(()=>{
  let n=0; const iv=setInterval(()=>{launch();n++;if(n>=10)clearInterval(iv);},380);
  anim();
},600);
</script>
